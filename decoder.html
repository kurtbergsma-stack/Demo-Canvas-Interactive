<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instructor Decoder — Active Learning Strategies</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #f8f7f4;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container { max-width: 700px; margin: 0 auto; }

  .header { margin-bottom: 2rem; }

  .badge {
    display: inline-block;
    background: #FAEEDA;
    color: #854F0B;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
    margin-bottom: 0.75rem;
  }

  h1 { font-size: 1.5rem; font-weight: 700; color: #1a1a1a; margin-bottom: 0.4rem; }
  .subtitle { font-size: 0.9rem; color: #666; line-height: 1.6; }

  .input-panel {
    background: #fff;
    border: 1px solid #e0ddd6;
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }

  .input-panel label {
    display: block;
    font-size: 0.82rem;
    font-weight: 600;
    color: #555;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .code-input {
    width: 100%;
    background: #f8f7f4;
    border: 1px solid #e0ddd6;
    border-radius: 8px;
    padding: 12px;
    font-family: 'Courier New', monospace;
    font-size: 0.85rem;
    color: #333;
    margin-bottom: 12px;
  }

  .code-input:focus { outline: none; border-color: #AFA9EC; }

  button {
    font-family: inherit;
    font-size: 0.85rem;
    padding: 9px 18px;
    border-radius: 8px;
    cursor: pointer;
    border: 1.5px solid;
    transition: background 0.15s;
  }

  .btn-primary { background: #534AB7; border-color: #534AB7; color: #fff; font-weight: 600; }
  .btn-primary:hover { background: #3C3489; }
  .btn-secondary { background: #fff; border-color: #d0cdc6; color: #444; margin-left: 8px; }
  .btn-secondary:hover { background: #f8f7f4; }

  .error-msg {
    background: #FCEBEB;
    border: 1px solid #F09595;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.85rem;
    color: #501313;
    margin-top: 12px;
    display: none;
  }

  .results {
    display: none;
  }

  .results.show { display: block; }

  .summary-card {
    background: #fff;
    border: 1px solid #e0ddd6;
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.25rem;
  }

  .summary-card h2 {
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 1rem;
    color: #1a1a1a;
  }

  .stat-row {
    display: flex;
    gap: 1rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }

  .stat {
    background: #f8f7f4;
    border-radius: 8px;
    padding: 10px 16px;
    text-align: center;
    min-width: 90px;
  }

  .stat-num {
    font-size: 1.5rem;
    font-weight: 700;
    color: #534AB7;
    display: block;
  }

  .stat-label {
    font-size: 0.72rem;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .attempt-card {
    border: 1px solid #e0ddd6;
    border-radius: 10px;
    padding: 1rem 1.25rem;
    margin-bottom: 1rem;
    background: #fdfcfa;
  }

  .attempt-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.75rem;
  }

  .attempt-label {
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #888;
  }

  .score-badge {
    font-size: 0.8rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
  }

  .score-3 { background: #E1F5EE; color: #085041; }
  .score-2 { background: #FAEEDA; color: #633806; }
  .score-1, .score-0 { background: #FCEBEB; color: #501313; }

  .selections { display: flex; flex-wrap: wrap; gap: 6px; }

  .sel-tag {
    font-size: 0.78rem;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid;
  }

  .sel-correct { background: #E1F5EE; border-color: #5DCAA5; color: #085041; }
  .sel-incorrect { background: #FCEBEB; border-color: #F09595; color: #501313; }

  .misconception-box {
    background: #fff;
    border: 1px solid #e0ddd6;
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.25rem;
  }

  .misconception-box h2 { font-size: 1rem; font-weight: 700; margin-bottom: 0.75rem; }

  .misconception-item {
    font-size: 0.875rem;
    color: #444;
    line-height: 1.6;
    padding: 8px 0;
    border-bottom: 1px solid #f0ede8;
  }

  .misconception-item:last-child { border-bottom: none; }
  .misconception-item strong { color: #1a1a1a; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="badge">Instructor Only</div>
    <h1>Student Response Decoder</h1>
    <p class="subtitle">Paste a student's answer code below to see their attempt history, selections, and any misconceptions.</p>
  </div>

  <div class="input-panel">
    <label>Student Answer Code</label>
    <input class="code-input" type="text" id="codeInput" placeholder="e.g. ALS91-TG3RF2-47-QTHBQTc..." />
    <div>
      <button class="btn-primary" onclick="decodeCode()">Decode</button>
      <button class="btn-secondary" onclick="clearAll()">Clear</button>
    </div>
    <div class="error-msg" id="errorMsg">Invalid code. Make sure you copied the full code from the student's activity.</div>
  </div>

  <div class="results" id="results">

    <div class="summary-card">
      <h2>Summary</h2>
      <div class="stat-row" id="statRow"></div>
      <div id="finalNote"></div>
    </div>

    <div class="summary-card" id="attemptsCard">
      <h2>Attempt Detail</h2>
      <div id="attemptsDetail"></div>
    </div>

    <div class="misconception-box" id="misconceptionBox">
      <h2>Misconceptions Identified</h2>
      <div id="misconceptionDetail"></div>
    </div>

  </div>
</div>

<script>
const ID_MAP = { T:'tps', G:'gps', R:'ref', O:'obj', L:'lec', Q:'quiz', N:'note' };

const WORD_LABELS = {
  tps:  'think-pair-share activities',
  gps:  'group problem-solving',
  ref:  'reflection journal',
  obj:  'clear learning objectives',
  lec:  'lecture',
  quiz: 'short quiz',
  note: 'passive note-taking',
};

const CORRECT_IDS = ['tps','gps','ref'];

const MISCONCEPTIONS = {
  obj:  'Selected "clear learning objectives" — a common misconception. Learning objectives describe goals, not strategies. Students may confuse course design elements with instructional strategies.',
  lec:  'Selected "lecture" — students may not yet understand the distinction between passive and active learning. Lecture delivers information but does not require students to actively construct knowledge.',
  quiz: 'Selected "short quiz" — students may conflate assessment tools with learning strategies. While retrieval practice supports learning, a quiz is primarily an assessment.',
  note: 'Selected "passive note-taking" — this was explicitly named in the paragraph as less effective, suggesting the student may not have read the text carefully or misunderstood the context.',
};

const CORRECT_PREFIX = 'ALS91-TG3RF2-47-';

function decodeCode() {
  const raw = document.getElementById('codeInput').value.trim();
  const errEl = document.getElementById('errorMsg');
  errEl.style.display = 'none';

  if (!raw.startsWith('ALS91-TG3RF2-47-')) {
    errEl.style.display = 'block';
    document.getElementById('results').classList.remove('show');
    return;
  }

  const encoded = raw.slice(CORRECT_PREFIX.length);
  let decoded;
  try {
    decoded = atob(encoded);
  } catch(e) {
    errEl.style.display = 'block';
    return;
  }

  const attemptStrings = decoded.split('|');
  const attempts = [];

  for (const str of attemptStrings) {
    const parts = str.split(':');
    if (parts.length !== 3) { errEl.style.display = 'block'; return; }
    const selLetters = parts[1].split('');
    const sel = selLetters.map(l => ID_MAP[l]).filter(Boolean);
    const score = parseInt(parts[2]);
    attempts.push({ sel, score });
  }

  renderResults(attempts);
}

function renderResults(attempts) {
  const totalAttempts = attempts.length;
  const finalScore = attempts[attempts.length - 1].score;

  // Stats
  document.getElementById('statRow').innerHTML = `
    <div class="stat"><span class="stat-num">${totalAttempts}</span><span class="stat-label">Attempt${totalAttempts !== 1 ? 's' : ''}</span></div>
    <div class="stat"><span class="stat-num">${finalScore}/3</span><span class="stat-label">Final Score</span></div>
    <div class="stat"><span class="stat-num">${attempts[0].score}/3</span><span class="stat-label">First Try</span></div>
  `;

  document.getElementById('finalNote').innerHTML = finalScore === 3
    ? '<p style="font-size:0.85rem;color:#0F6E56;">✓ Student completed the activity successfully.</p>'
    : '<p style="font-size:0.85rem;color:#993C1D;">✗ Student did not achieve 3/3 — this code should not appear in Canvas if the activity is set up correctly.</p>';

  // Attempts detail
  const detail = document.getElementById('attemptsDetail');
  detail.innerHTML = '';
  attempts.forEach((a, i) => {
    const div = document.createElement('div');
    div.className = 'attempt-card';
    const tags = a.sel.map(id => {
      const isCorrect = CORRECT_IDS.includes(id);
      return `<span class="sel-tag ${isCorrect ? 'sel-correct' : 'sel-incorrect'}">${WORD_LABELS[id] || id}</span>`;
    }).join('');
    div.innerHTML = `
      <div class="attempt-header">
        <span class="attempt-label">Attempt ${i + 1}</span>
        <span class="score-badge score-${a.score}">${a.score}/3</span>
      </div>
      <div class="selections">${tags}</div>
    `;
    detail.appendChild(div);
  });

  // Misconceptions
  const allWrong = new Set();
  attempts.forEach(a => a.sel.filter(id => !CORRECT_IDS.includes(id)).forEach(id => allWrong.add(id)));

  const miscEl = document.getElementById('misconceptionDetail');
  miscEl.innerHTML = '';
  if (allWrong.size === 0) {
    miscEl.innerHTML = '<p style="font-size:0.85rem;color:#0F6E56;">No misconceptions detected — student selected only correct answers across all attempts.</p>';
  } else {
    allWrong.forEach(id => {
      if (MISCONCEPTIONS[id]) {
        const div = document.createElement('div');
        div.className = 'misconception-item';
        div.innerHTML = `<strong>"${WORD_LABELS[id]}"</strong> — ${MISCONCEPTIONS[id]}`;
        miscEl.appendChild(div);
      }
    });
  }

  document.getElementById('results').classList.add('show');
}

function clearAll() {
  document.getElementById('codeInput').value = '';
  document.getElementById('results').classList.remove('show');
  document.getElementById('errorMsg').style.display = 'none';
}
</script>
</body>
</html>
